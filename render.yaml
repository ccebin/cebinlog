# Render.com ücretsiz Web Service — Blueprint olarak veya manuel ayar ile kullanın.
# https://render.com/docs/free

services:
  - type: web
    name: cebin-log
    runtime: node
    plan: free
    # NODE_ENV=production iken npm bazen devDeps atlar; vite bulunamaz (127).
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
